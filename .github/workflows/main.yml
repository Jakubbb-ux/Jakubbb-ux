on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SNAKE_COLOR: "#3A86FF"
  OUTPUT_BRANCH: "output"
  OUTPUT_DIR: "dist"

jobs:
  generate-and-publish-snake:
    name: Generate Snake GIF and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation SVGs
        id: generate-snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=#3A86FF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#3A86FF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated SVG files exist
        run: |
          [ ! -f dist/github-contribution-grid-snake.svg ] && exit 1
          [ ! -f dist/github-contribution-grid-snake-dark.svg ] && exit 1

      - name: Publish snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: ${{ env.OUTPUT_BRANCH }}
          build_dir: ${{ env.OUTPUT_DIR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
